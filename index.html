    <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Split Rubber</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ОСНОВНИЙ ФОН (РЕЗИНА) */
        html, body {
            margin: 0;
            padding: 0;
            /* Це градієнтна гума: зліва фіолетова, справа синя. Вона заповнює пустоту між биком і низом */
            background: linear-gradient(90deg, #3d054d 0%, #0c0822 50%, #02384d 100%);
            
            min-height: 100vh; 
            display: flex; /* Це змусить нижній блок завжди падати в кінець сторінки */
            flex-direction: column;
            overflow-x: hidden; 
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        /* 1. ВЕРХ: Могутній бик. Прив'язаний до верху. */
        .bg-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 140vw; /* Висота захоплює бика і плавно розчиняється */
            background-image: url('1000015397.jpg');
            background-size: 100vw auto;
            background-position: top center;
            background-repeat: no-repeat;
            /* Розчинення внизу */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* 2. СЕРЕДИНА: Текст. Розтягує сторінку як гуму. */
        .content-area {
            flex-grow: 1; /* Виштовхує нижній блок у самісінький кінець */
            position: relative;
            z-index: 2;
            padding: 20px;
            margin-top: 110vw; /* Відступ, щоб текст починався нижче бика */
        }

        /* 3. НИЗ: Схеми (те, що під помаранчевою лінією). */
        .bg-bottom {
            position: relative;
            z-index: 0;
            width: 100vw;
            height: 90vw; /* Захоплює тільки нижню частину картинки */
            background-image: url('1000015397.jpg');
            background-size: 100vw auto;
            /* ОСЬ ВОНО: бере тільки самий низ твого фото */
            background-position: bottom center; 
            background-repeat: no-repeat;
            /* Розчинення зверху */
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            margin-top: auto; /* Намертво прибиває схеми до кінця скролу */
            margin-bottom: 80px; /* Місце, щоб кнопка не закривала схеми */
            pointer-events: none;
        }

        /* Кнопка виходу */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-top"></div>

    <div class="content-area">
        <h3 style="color: #05d9e8;">[ SYSTEM LOG : SPLIT SCROLL ]</h3>
        <p>> Бик на своєму місці... OK</p>
        <br><br><br><br><br><br>
        
        <p>> Гума розтягується... OK</p>
        <br><br><br><br><br><br>
        
        <p>> Нижні схеми чекають у кінці... OK</p>
        <br><br><br><br><br><br>
        
        <p style="color: #bc13fe;">> УВАГА: ІДЕАЛЬНИЙ КОД ЗАВАНТАЖЕНО!</p>
        <br><br><br><br><br><br>
        
        <p>> Кінець логу.</p>
    </div>

    <div class="bg-bottom"></div>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
