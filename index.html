<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Infinite Photo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ПОВНІСТЮ ЧИСТИЙ ЕКРАН - ЖОДНИХ РАМОК */
        html, body {
            margin: 0;
            padding: 0;
            
            /* Робимо сторінку дуже довгою для гортання */
            min-height: 300vh; 
            
            /* МАГІЯ БЕЗКІНЕЧНОГО ФОТО: беремо твій файл і повторюємо його вниз */
            background-image: url('1000015397.jpg');
            background-size: 100vw auto; /* Ширина на весь екран */
            background-repeat: repeat-y; /* Повторення тільки вниз (безкінечно) */
            background-color: #000;
            
            overflow-x: hidden; /* Заборона гортати вбік */
        }

        /* Кнопка виходу завжди висить знизу */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
