<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Rubber</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ПОВНІСТЮ ЧИСТИЙ ЕКРАН - ЖОДНИХ РАМОК */
        html, body {
            margin: 0;
            padding: 0;
            
            /* Сторінка займає рівно 1 екран. Скрол з'явиться ТІЛЬКИ якщо буде багато тексту */
            min-height: 100vh; 
            
            /* МАГІЯ РЕЗИНИ: 
               1. no-repeat - бик більше ніколи не повториться.
               2. Колір #0d1128 - це темний космічний колір, який продовжує низ твоєї фотки */
            background-color: #0d1128; 
            background-image: url('1000015397.jpg');
            background-size: 100vw auto; /* Картинка чітко на всю ширину */
            background-position: top center; /* Бик намертво прикріплений до самого верху */
            background-repeat: no-repeat; /* ЗАБОРОНА ПОВТОРЕННЯ */
            
            overflow-x: hidden; /* Заборона гортати вбік */
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        /* Контейнер для твого майбутнього тексту */
        .content-area {
            padding: 20px;
            /* Відступ зверху, щоб текст починався нижче бика (можеш міняти цифру) */
            margin-top: 350px; 
            padding-bottom: 100px; /* Місце знизу, щоб кнопка не перекривала текст */
        }

        /* Кнопка виходу завжди висить знизу екрану телефону */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="content-area">
        </div>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
