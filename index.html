<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
            font-family: monospace;
            color: #fff;
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Гумова середина: беремо колір фону з твоєї фотки */
            background-color: #0d1128; 
        }

        /* ВЕРХ: БИК (оригінальний розмір) */
        .header-bull {
            width: 100%;
            /* Співвідношення сторін для верхньої частини */
            aspect-ratio: 10 / 11; 
            background: url('1000015397.jpg') no-repeat top center;
            background-size: 100% auto;
            flex-shrink: 0;
        }

        /* СЕРЕДИНА: ТЕКСТ (гума) */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            z-index: 2;
        }

        /* НИЗ: СХЕМИ (ТОЧНИЙ ОРИГІНАЛЬНИЙ РОЗМІР) */
        .footer-schemes {
            width: 100%;
            /* aspect-ratio гарантує, що схеми не збільшаться і не зменшаться відносно ширини */
            aspect-ratio: 10 / 5; 
            background: url('1000015397.jpg') no-repeat bottom center;
            background-size: 100% auto;
            flex-shrink: 0;
            margin-bottom: 70px; /* Місце для кнопки */
        }

        .fixed-exit {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 10px 30px;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 10px #bc13fe;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-bull"></div>

        <div class="main-content">
            <h3 style="color:#05d9e8">LOG_STATUS: READY</h3>
            <p>Тут буде твій довгий текст...</p>
            <br><br><br><br><br><br><br><br><br><br>
            <p>Кінець тексту. Нижче — оригінальні схеми.</p>
        </div>

        <div class="footer-schemes"></div>
    </div>

    <div class="fixed-exit">
        <button class="btn" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
