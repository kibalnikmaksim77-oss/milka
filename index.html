<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Scroll</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            /* Глибокий темний колір під неон, у який перейде картинка */
            background-color: #050010; 
            min-height: 200vh; /* Дає можливість гортати у безкінечність */
            
            /* Безкінечні неонові лінії по боках, які тягнуться вниз */
            border-left: 3px solid #bc13fe;
            border-right: 3px solid #bc13fe;
            box-shadow: inset 0 0 20px rgba(188, 19, 254, 0.6);
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Бик більше не прибитий цвяхами. Він зверху, і ти можеш його прогортати */
        .bg-bull {
            width: 100vw; /* На всю ширину екрану */
            display: block;
            
            /* ОСЬ ЦЕ CSS-МАГІЯ: плавно розчиняє низ картинки в прозорість */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
        }

        /* Неонове світіння, яке продовжує картинку вниз */
        .neon-abyss {
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(188, 19, 254, 0.15), transparent);
        }

        /* Кнопка виходу завжди висить знизу, хоч скільки гортай */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="1000015397.jpg" class="bg-bull">

    <div class="neon-abyss"></div>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
