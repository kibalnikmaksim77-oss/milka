<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }

        /* ГОЛОВНА МАГІЯ ТУТ: ТІЛЬКИ КОД, НІЯКОЇ ГЕНЕРАЦІЇ */
        .cyber-container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;

            /* Використовуємо border-image для ідеальної гуми без розривів */
            border-style: solid;
            border-image-source: url('1000015397.jpg');
            
            /* Розрізаємо фото: верх 42%, низ 18%. 
               'fill' залишає середину картинки як гумове наповнення */
            border-image-slice: 42% 0 18% 0 fill;
            
            /* Виставляємо точні пропорції: верхня частина (бик) і нижня (схеми) */
            border-width: 115vw 0 50vw 0;
            
            /* stretch тягне пікселі неону по вертикалі, створюючи 'резину' */
            border-image-repeat: stretch;
        }

        .content-area {
            /* Текст лежить поверх 'гуми' */
            padding: 0 20px;
            margin-top: -10vw; /* Коригування позиції тексту відносно бика */
            z-index: 5;
        }

        .status-header {
            color: #05d9e8;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .fixed-footer {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn-disconnect {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 45px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.5);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="cyber-container">
        <div class="content-area">
            <div class="status-header">>> SYSTEM_READY</div>
            
            <p>Тут починається твій довгий текст.</p>
            <p>Зараз ми перевіряємо, як тягнеться гума...</p>
            
            <br><br><br><br><br><br><br><br><br><br><br><br>
            
            <p>Як бачиш, бик зверху, а схеми знизу — і все це одна картинка.</p>
            <p>Дизайн тепер цілісний і без помилок.</p>
        </div>
    </div>

    <div class="fixed-footer">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
