<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Infinite Photo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Обнуляємо все, прибираємо БУДЬ-ЯКІ рамки по боках */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000; 
            overflow-x: hidden; /* Забороняє гортати вбік */
        }

        /* Контейнер для безкінечного скролу */
        .scroll-container {
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* Твоя фотографія. Вона стоїть зверху і буде гортатися вгору (бик іде вгору) */
        .cyber-bull {
            width: 100vw;
            height: auto;
            display: block; /* Прибирає будь-які щілини під фото */
        }

        /* Це "безкінечне" продовження фотографії вниз */
        .infinite-bottom {
            width: 100vw;
            min-height: 200vh; /* Штучно робить сторінку дуже довгою */
            /* Плавний градієнт, який імітує продовження твого неонового фону */
            background: linear-gradient(to bottom, #100020, #000000);
        }

        /* Кнопка виходу завжди висить знизу на екрані телефону */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <img src="1000015397.jpg" class="cyber-bull">
        
        <div class="infinite-bottom"></div>
    </div>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
