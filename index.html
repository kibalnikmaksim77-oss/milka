<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cyber-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            
            /* БЕРЕМО ОРИГІНАЛЬНЕ ФОТО */
            border-style: solid;
            border-color: transparent;
            border-image-source: url('1000015397.jpg');
            
            /* РІЖЕМО ЧІТКО ПО ТВОЇХ ЛІНІЯХ: 
               75% фото — це верх (бик)
               15% фото — це низ (схеми під помаранчевою лінією)
               fill — тягне тільки чисті лінії між ними */
            border-image-slice: 75% 0 15% 0 fill;
            
            /* РОЗМІРИ НА ЕКРАНІ (щоб не плющило оригінал) */
            border-width: 125vw 0 25vw 0;
            
            /* ТЯГНЕМО ТІЛЬКИ СЕРЕДИНУ */
            border-image-repeat: stretch;
        }

        .content-area {
            flex-grow: 1;
            /* Текст заблокований відступами */
            padding: 10px 20px 80px 20px;
            position: relative;
            z-index: 10;
        }

        .fixed-btn-container {
            position: fixed;
            bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }

        .btn-disconnect {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #bc13fe; color: #bc13fe;
            padding: 12px 45px; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px #bc13fe; cursor: pointer;
            backdrop-filter: blur(5px); border-radius: 4px;
        }

        .sys-text { color: #05d9e8; font-weight: bold; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="cyber-container">
        <div class="content-area">
            <span class="sys-text">>> SYSTEM_READY</span>
            
            <p>Тепер лінії оригіналу зберігаються на максимум і тягнуться.</p>
            <p>Схеми під помаранчевою смужкою завжди в кінці.</p>
            
            <br><br><br><br><br><br><br><br><br><br>
            <p>Жодних дублікатів і розмиття.</p>
            <br><br><br><br><br><br><br><br><br><br>
        </div>
    </div>

    <div class="fixed-btn-container">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
