<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Mini App</title>
    <link rel="stylesheet" href="style.css?v=12">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-container" class="neon-border">
        <div id="main-content-view" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative;">
            <div id="burger-btn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>

            <div id="settings-btn" class="hidden" onclick="toggleSettings()">⋮</div>

            <div id="settings-menu" class="hidden">
                <button class="settings-item" onclick="triggerBgUpload()">
                    <span class="icon-neon icon-frame"></span> Встановити фон
                </button>
                <button class="settings-item" onclick="resetBackground()">
                    <span class="icon-neon icon-trash"></span> Видалити фон
                </button>
                <input type="file" id="bg-upload" accept="image/*" class="hidden" onchange="changeBackground(event)">
            </div>

            <div id="user-commands-safe-zone"></div>
        </div>

        <div id="dynamic-page-view" class="hidden" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 150;" onclick="handleScreenTap(event)">
            <div id="back-btn-container" style="position: absolute; top: 70px; left: 20px; z-index: 160;">
                <button class="note-btn" onclick="closeDynamicPage()" style="padding: 5px 10px; font-size: 10px; background: rgba(0,0,0,0.6);">⬅ НАЗАД</button>
            </div>
            
            <div id="dynamic-settings-btn" class="hidden" style="position: absolute; top: 20px; right: 20px; color: #bc13fe; font-size: 26px; cursor: pointer; z-index: 160; text-shadow: 0 0 10px #bc13fe;" onclick="toggleSettings()">⋮</div>
            
            <div id="dynamic-body" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
                <div id="dynamic-text-content" style="color: #fff; text-shadow: 0 0 5px #000; text-align: center; font-size: 14px;"></div>
                <p class="dev-text" id="dynamic-status" style="margin-top: 20px;">Система в стадії розробки...</p>
            </div>

            <div id="creator-panel" class="hidden" style="position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); border-top: 1px solid #bc13fe; padding: 20px; box-sizing: border-box; z-index: 200; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; gap: 10px;">
                <div style="color: #bc13fe; font-size: 10px; font-weight: bold; text-align: center; margin-bottom: 5px;">ПАНЕЛЬ ТВОРЦЯ 👑</div>
                <button class="menu-item" onclick="setPageText()">📝 Додати/Змінити текст</button>
                <button class="menu-item" onclick="alert('У розробці: Створення кнопки')">🎛 Додати кнопку</button>
                <button class="menu-item" style="border-color: #ff4444; color: #ff4444;" onclick="deleteCurrentPage()">🗑 Видалити цей розділ</button>
                <button class="note-btn" onclick="toggleCreatorPanel()" style="margin-top: 5px;">Закрити</button>
            </div>
        </div>
    </div>

    <div id="side-menu">
        <div class="menu-header">
            <span>МЕНЮ</span>
            <button onclick="toggleMenu()" class="close-btn">❌</button>
        </div>
        <div class="menu-content">
            <div id="user-view"></div>
            <div id="admin-view" class="hidden">
                <div class="divider"></div>
                <button class="menu-item secret-btn" onclick="openChat()">⚡ Milka Bot</button>
                <div id="owner-view" style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden neon-border">...</div>
    <div id="delete-confirm-modal" class="hidden">...</div>

    <script src="script.js?v=12"></script>
</body>
</html>
