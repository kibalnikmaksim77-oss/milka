<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Mini App</title>
    <link rel="stylesheet" href="style.css?v=25">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    
    <div id="app-container" class="neon-border">
        <div id="main-content-view" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative;">
            
            <div id="burger-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div id="settings-btn" class="hidden" onclick="toggleContextMenu(event, 'main', 'main')">⋮</div>

            <input type="file" id="bg-upload" accept="image/*" class="hidden" onchange="changeBackground(event)">

            <div id="user-commands-safe-zone" class="mask-scroll"></div>
            
        </div>
    </div>

    <div id="context-menu" class="hidden"></div>

    <div id="side-menu">
        <div class="menu-header">
            <span>МЕНЮ</span>
            <button onclick="toggleMenu()" class="close-btn">❌</button>
        </div>
        <div class="menu-content">
            <div id="user-view"></div>
            
            <div id="admin-view" class="hidden">
                <div class="divider"></div>
                <button class="cyber-btn secret-btn" onclick="openChat()">⚡ Milka Bot</button>
                
                <div id="owner-view" style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;"></div>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden neon-border">
        
        <div class="chat-header">
            <span class="neon-title">
                <span class="neon-bot">🤖</span> Milka System
            </span>
            
            <div class="header-controls">
                <div id="format-trigger" class="hidden" onclick="toggleFormatMenu()">⋮</div>
                <button onclick="closeChat()" class="close-btn">❌</button>
            </div>
            
            <div id="format-menu" class="hidden">
                <div class="format-item" onmousedown="applyFormat('codeBlock', event)">Кодовий <code>&lt;/&gt;</code></div>
                <div class="format-item" onmousedown="applyFormat('bold', event)"><b>Жирний</b></div>
                <div class="format-item" onmousedown="applyFormat('italic', event)"><i>Курсив</i></div>
                <div class="format-item" onmousedown="applyFormat('monospaced', event)"><code>Моно</code></div>
                <div class="format-item" onmousedown="applyFormat('strikethrough', event)"><s>Закреслений</s></div>
                <div class="format-item" onmousedown="applyFormat('underline', event)"><u>Підкреслений</u></div>
                <div class="format-item" onmousedown="applyFormat('link', event)">Створити посилання 🔗</div>
                <div class="format-item" onmousedown="applyFormat('plain', event)">Звичайний</div>
            </div>
        </div>
        
        <div id="chat-messages" class="mask-scroll"></div>
        <div id="media-preview-container" class="hidden"></div>
        
        <div class="chat-input-area">
            <button onclick="document.getElementById('attach-upload').click()" class="attach-btn icon-neon-btn">🖇️</button>
            <input type="file" id="attach-upload" style="display: none !important; opacity: 0; position: absolute; z-index: -1;" accept="image/*,video/*" multiple onchange="handleAttachment(event)">
            <div class="editor-wrapper">
                <div id="chat-input" class="editor" contenteditable="true" data-placeholder="Команда..."></div>
                <button onclick="sendMessage()" class="send-btn-inside circle-btn icon-neon-btn">➤</button>
            </div>
        </div>
    </div>

    <div id="delete-confirm-modal" class="hidden">
        <div class="delete-modal-box neon-border">
            <p>🗑 Видалити це повідомлення?</p>
            <div class="delete-modal-buttons">
                <button id="btn-cancel-delete" class="delete-btn cancel">Скасувати</button>
                <button id="btn-confirm-delete" class="delete-btn confirm">Видалити</button>
            </div>
        </div>
    </div>

    <div id="save-layout-modal" class="hidden">
        <div class="delete-modal-box neon-border">
            <p>🛠 Зберегти новий порядок кнопок?</p>
            <div class="delete-modal-buttons">
                <button id="btn-cancel-layout" class="delete-btn cancel" onclick="cancelDragAndDrop()">Скасувати</button>
                <button id="btn-confirm-layout" class="delete-btn confirm" onclick="saveLayout('auto')">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="text-editor-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 99999; display: flex; align-items: center; justify-content: center;">
        <div class="delete-modal-box neon-border" style="width: 90%; max-width: 400px; padding: 15px; background: #0a0a0a;">
            <p style="margin-bottom: 15px; font-weight: bold; font-size: 16px; text-shadow: 0 0 5px rgba(255,255,255,0.5);">📝 Редактор тексту</p>
            
            <div class="format-toolbar" style="display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; background: #151515; padding: 8px; border-radius: 8px; border: 1px solid #333;">
                <button class="cyber-btn btn-small" style="width: auto; margin:0;" onclick="applyTextFormat('bold')"><b>B</b></button>
                <button class="cyber-btn btn-small" style="width: auto; margin:0;" onclick="applyTextFormat('italic')"><i>I</i></button>
                <button class="cyber-btn btn-small" style="width: auto; margin:0;" onclick="applyTextFormat('underline')"><u>U</u></button>
                <button class="cyber-btn btn-small" style="width: auto; margin:0;" onclick="applyTextFormat('monospaced')"><code>&lt;/&gt;</code></button>
                
                <div style="display: flex; align-items: center; border: 1px solid #bc13fe; border-radius: 4px; padding: 2px 5px; background: rgba(188,19,254,0.1);">
                    <span style="font-size: 10px; margin-right: 5px; color:#bc13fe;">Колір:</span>
                    <input type="color" id="text-color-picker" value="#00ffcc" style="width: 25px; height: 25px; border: none; background: none; cursor: pointer; padding:0;" onchange="applyTextFormat('foreColor', this.value)">
                </div>

                <div style="display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 5px; background: rgba(188,19,254,0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid #bc13fe;">
                    <span style="font-size: 11px; color:#bc13fe;">📏 Масштаб:</span>
                    <input type="range" id="text-size-slider" min="10" max="36" value="12" style="flex-grow: 1; accent-color: #bc13fe;" oninput="updateTextSize(this.value)">
                    <span id="text-size-display" style="font-size: 11px; color:#bc13fe; min-width: 25px; text-align: right;">12px</span>
                </div>
            </div>

            <div id="custom-text-input" contenteditable="true" class="editor" style="min-height: 80px; max-height: 150px; background: #000; border: 1px solid #bc13fe; margin-bottom: 15px; border-radius: 8px; text-align: left; font-family: monospace; color: #00ffcc; text-shadow: 0 0 5px currentColor; padding: 10px; overflow-y: auto; font-size: 12px;" data-placeholder="Твій кібер-лог..."></div>
            
            <div class="delete-modal-buttons" style="display: flex; gap: 10px;">
                <button class="delete-btn cancel" style="flex: 1;" onclick="document.getElementById('text-editor-modal').classList.add('hidden')">Скасувати</button>
                <button class="delete-btn confirm" style="flex: 1;" onclick="saveNewTextBlock()">На екран</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
