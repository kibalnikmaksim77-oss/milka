<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Milka App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <video id="intro-video" src="33ee3aaa-dd80-43e5-b435-f07bb9c6f236.mp4" autoplay muted playsinline></video>
    
    <div id="logo-patch"></div>

    <div id="app-container" class="hidden">
        <div id="burger-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <button id="exit-btn" onclick="closeApp()">КІБЕРГ-СОН 💤</button>
    </div>

    <div id="side-menu">
        <div class="menu-header">
            <span class="menu-title">МЕНЮ</span>
            <button onclick="toggleMenu()" class="close-btn">❌</button>
        </div>
        
        <div class="menu-content">
            <div id="user-view" class="view-section">
                <p class="dev-text">Система в стадії розробки...</p>
                <div class="divider"></div>
            </div>
            <div id="admin-view" class="view-section hidden">
                <button class="menu-item secret-btn" onclick="openChat()">⚡ Milka Bot</button>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden">
        <div class="chat-header">
            <span class="neon-title"><span class="neon-bot">🤖</span> Milka System</span>
            <button onclick="closeChat()" class="close-btn">❌</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Команда...">
            <button onclick="sendMessage()" class="send-btn">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
