            <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Cyber Bull</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #050505;
            color: #bc13fe;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .bull-container {
            width: 300px;
            height: 300px;
            border: 2px solid #bc13fe;
            box-shadow: 0 0 20px #bc13fe, inset 0 0 10px #bc13fe;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(188, 19, 254, 0.05);
            border-radius: 15px;
        }

        .bull-container img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
            filter: drop-shadow(0 0 10px #bc13fe);
        }

        .status-text {
            margin-top: 25px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #bc13fe;
        }
    </style>
</head>
<body>

    <div class="bull-container">
        <img src="1000015397.jpg" alt="CYBER BULL">
    </div>

    <div class="status-text">SYSTEM: ONLINE | <span id="user">LOADING...</span></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user').innerText = user.first_name.toUpperCase();
        }
        tg.HapticFeedback.impactOccurred('heavy');
    </script>
</body>
</html>
