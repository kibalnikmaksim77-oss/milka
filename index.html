<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Final Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            /* Колір фону для всієї сторінки, щоб гума була безшовною */
            background-color: #0d1128; 
        }

        /* ВЕРХНЯ ЧАСТИНА: БИК (Фіксований) */
        .top-bull {
            width: 100vw;
            /* Пропорція картинки, щоб бик був ідеальним */
            aspect-ratio: 1000 / 1100; 
            background: url('1000015397.jpg') no-repeat top center;
            background-size: 100% auto;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        /* СЕРЕДНЯ ЧАСТИНА: ТЕКСТ (Гума) */
        .rubber-center {
            flex-grow: 1;
            padding: 0 20px;
            /* ОСЬ ТУТ ВИПРАВЛЕННЯ: відступ, щоб текст не заходив на бика */
            padding-top: 40px; 
            position: relative;
            z-index: 2;
            /* Плавний перехід кольору від картинки до фону */
            background: linear-gradient(to bottom, transparent, #0d1128 15%);
        }

        /* НИЖНЯ ЧАСТИНА: СХЕМИ (Фіксований оригінал) */
        .bottom-schemes {
            width: 100vw;
            aspect-ratio: 1000 / 450;
            background: url('1000015397.jpg') no-repeat bottom center;
            background-size: 100% auto;
            flex-shrink: 0;
            margin-bottom: 80px; /* Місце під кнопку */
        }

        .footer-fixed {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px #bc13fe;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Стиль для заголовка, щоб виглядав як у терміналі */
        .status-line {
            color: #05d9e8;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bull"></div>

        <div class="rubber-center">
            <span class="status-line">>> SYSTEM_CHECK: TEXT_POSITION_OK</span>
            
            <p>Тепер текст починається чітко під картинкою бика.</p>
            <p>Він не заважає логотипу і не перекриває морду.</p>
            
            <br><br><br><br><br><br><br><br><br><br>
            <p>Гортай нижче, щоб побачити схеми.</p>
            <br><br><br><br><br><br><br><br><br><br>
        </div>

        <div class="bottom-schemes"></div>
    </div>

    <div class="footer-fixed">
        <button class="btn" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
