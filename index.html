<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber True Rubber</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* 1. ВЕРХ: БИК ТА ЛОГО */
        .top-bull {
            width: 100vw;
            /* Фіксована пропорція (висота підлаштовується під ширину). 
               Бик завжди буде ідеальним, без розтягувань! */
            aspect-ratio: 1000 / 1150; 
            background: url('1000015397.jpg') no-repeat top center;
            background-size: 100% auto;
            flex-shrink: 0;
            z-index: 3;
        }

        /* 2. СЕРЕДИНА: ГУМКА І ТЕКСТ */
        .middle-rubber {
            flex-grow: 1;
            /* МАГІЯ КОДУ: Беремо саму фотку і розтягуємо її висоту в 50 разів. 
               Вона витягує твої неонові лінії з фотографії як струни! Ніяких рамок! */
            background-image: url('1000015397.jpg');
            background-size: 100% 5000%; 
            background-position: center 65%; /* Беремо ту частину фото, де немає деталей, тільки неон */
            
            /* Робимо так, щоб текст не прилипав до бика */
            padding: 30px 20px 40px 20px;
            
            /* Зшиваємо блоки без щілин */
            margin-top: -2px;
            margin-bottom: -2px;
            position: relative;
            z-index: 2;
        }

        /* 3. НИЗ: СХЕМИ ПІД ОРАНЖЕВОЮ ЛІНІЄЮ */
        .bottom-schemes {
            width: 100vw;
            /* Фіксована пропорція низу. Схеми не будуть стиснутими чи видовженими. */
            aspect-ratio: 1000 / 450; 
            background: url('1000015397.jpg') no-repeat bottom center;
            background-size: 100% auto;
            flex-shrink: 0;
            margin-bottom: 80px; /* Місце для кнопки */
            z-index: 3;
        }

        /* КНОПКА DISCONNECT */
        .fixed-btn-container {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn-disconnect {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 45px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px #bc13fe;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .sys-text {
            color: #05d9e8;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bull"></div>

        <div class="middle-rubber">
            <span class="sys-text">>> RUBBER_MODE: PERFECT</span>
            
            <p>Текст починається чітко під биком і не зачіпає його.</p>
            <p>Бик має ідеальний розмір. Схеми знизу мають ідеальний розмір.</p>
            
            <br><br><br><br><br><br><br><br><br><br><br><br>
            <p>А краї цього блоку — це розтягнуті пікселі твоєї ж фотографії!</p>
            <p>Тепер це виглядає максимально дорого.</p>
            <br><br><br><br><br><br><br><br><br><br>
        </div>

        <div class="bottom-schemes"></div>
    </div>

    <div class="fixed-btn-container">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
