<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Infinite Scroll</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Налаштування самої сторінки */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            
            /* Робимо сторінку штучно дуже довгою, щоб завжди можна було гортати */
            min-height: 200vh; 
            
            /* Безкінечні неонові краї, які тягнуться вниз */
            border-left: 3px solid #bc13fe;
            border-right: 3px solid #bc13fe;
            box-shadow: inset 0 0 20px rgba(188, 19, 254, 0.6);
            
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        /* Бик приклеєний до екрану. Ти гортаєш вниз, а він стоїть на місці. */
        .bg-bull {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* Кнопка виходу - вона теж приклеєна до низу екрану */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="1000015397.jpg" class="bg-bull">

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
