<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Bot App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            border: 2px solid #a855f7;
            box-shadow: 0 0 15px #a855f7;
            border-radius: 15px;
            padding: 30px;
            background: #1a1a1a;
            width: 85%;
        }
        h1 {
            color: #a855f7;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status {
            font-size: 14px;
            color: #22c55e;
            margin-bottom: 20px;
        }
        button {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px #a855f7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MILKA TERMINAL</h1>
        <div class="status">● СИСТЕМА АКТИВНА</div>
        <p>Вітаємо в офіційному інтерфейсі Milka Bot.</p>
        <button onclick="Telegram.WebApp.close()">ЗАКРИТИ ТЕРМІНАЛ</button>
    </div>

    <script>
        // Повідомляємо Telegram, що апка готова до роботи
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Розгортаємо на весь екран
    </script>
</body>
</html>
