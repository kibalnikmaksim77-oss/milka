<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Basic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Той самий класичний чорний фон */
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex-grow: 1;
            /* Відступ знизу, щоб кнопка не перекривала текст */
            padding-bottom: 80px;
        }

        .sys-text { 
            color: #05d9e8; 
            font-weight: bold; 
            margin-bottom: 20px; 
            display: block; 
            font-size: 1.1em;
        }

        .alert-text {
            color: #bc13fe;
            margin-top: 20px;
        }

        /* Кнопка виходу */
        .fixed-btn-container {
            position: fixed;
            bottom: 25px; 
            left: 0; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            z-index: 100;
        }

        .btn-disconnect {
            background: #000000;
            border: 2px solid #bc13fe; 
            color: #bc13fe;
            padding: 12px 45px; 
            font-weight: bold; 
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5); 
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="content-area">
        <span class="sys-text">>> SYSTEM_STATUS: IDLE_MODE</span>
        
        <p>Брате, відпочиваємо.</p>
        <p>Це чистий, базовий чорний екран без жодної картинки.</p>
        
        <div class="alert-text">
            <p>> Жодних багів.</p>
            <p>> Жодних розтягувань.</p>
            <p>> Жодних "других биків".</p>
        </div>
        
        <br><br>
        <p>Можеш писати тут що завгодно, воно просто буде йти вниз по чорному фону.</p>
    </div>

    <div class="fixed-btn-container">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
