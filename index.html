<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka True Image Rubber</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden; 
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        /* МАГІЯ ГУМИ: Контейнер, який розрізає і розтягує твоє фото */
        .rubber-wrapper {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            
            /* Обов'язково для роботи border-image */
            border-style: solid;
            border-color: transparent;
            
            /* БЕРЕМО ТВОЄ ФОТО */
            border-image-source: url('1000015397.jpg');
            
            /* РОЗРІЗАЄМО: 45% зверху (бик), 20% знизу (схеми). 
               Слово "fill" каже коду залити порожнечу розтягнутою серединою фотографії! */
            border-image-slice: 45% 0 20% 0 fill; 
            
            /* ВІДОБРАЖЕННЯ НА ЕКРАНІ: 110vw для бика, 50vw для схем */
            border-width: 110vw 0 50vw 0; 
            
            /* КОМАНДА ТЯГНУТИ: тягне середину фотографії (всі твої технологічні лінії) як гуму */
            border-image-repeat: stretch;
            
            /* Внутрішній відступ для тексту, щоб не прилипав до країв екрану */
            padding: 20px; 
            padding-bottom: 50px; 
        }

        /* Кнопка виходу */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-exit {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="rubber-wrapper">
        <h3 style="color: #05d9e8;">[ SYSTEM LOG : TRUE IMAGE RUBBER ]</h3>
        <p>> Бик на місці, без деформацій... OK</p>
        <br><br><br><br><br><br>
        
        <p>> Оригінальні неонові лінії розтягуються... OK</p>
        <br><br><br><br><br><br>
        
        <p>> Схеми чекають під текстом... OK</p>
        <br><br><br><br><br><br>
        
        <p style="color: #bc13fe;">> УВАГА: ТЕПЕР ТЯГНЕТЬСЯ САМЕ ФОТО!</p>
        <br><br><br><br><br><br>
        
        <p>> Кінець логу.</p>
    </div>

    <div class="fixed-bottom-bar">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
