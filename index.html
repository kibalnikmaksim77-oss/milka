<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Cyber App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-container">
        <div id="admin-menu-btn" class="hidden" onclick="toggleAdminPanel()">
            <span></span><span></span><span></span>
        </div>

        <div id="main-content">
            <h1 id="welcome-text">MILKA SYSTEM</h1>
            <div id="status-line">СТАТУС: ОЧІКУВАННЯ...</div>
        </div>

        <button id="exit-btn" onclick="closeApp()">КІБЕРГ-СОН 💤</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="panel-content">
            <h3>ТЕРМІНАЛ ВЛАСНИКА</h3>
            <input type="text" id="admin-input" placeholder="Введіть команду...">
            <button onclick="sendAdminCmd()">ВИКОНАТИ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
