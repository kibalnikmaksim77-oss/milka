<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-container">
        <div id="burger-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>

        <div id="settings-btn" class="hidden" onclick="toggleSettings()">⋮</div>

        <div id="settings-menu" class="hidden">
            <button class="settings-item" onclick="triggerBgUpload()">🖼️ Встановити фон</button>
            <button class="settings-item" onclick="resetBackground()">🗑️ Видалити фон</button>
            <input type="file" id="bg-upload" accept="image/*" class="hidden" onchange="changeBackground(event)">
        </div>

        <div id="user-commands-safe-zone">
            </div>

        <button id="exit-btn" onclick="closeApp()">КІБЕРГ-СОН 💤</button>
    </div>

    <div id="side-menu">
        <div class="menu-header">
            <span>МЕНЮ</span>
            <button onclick="toggleMenu()" class="close-btn">❌</button>
        </div>
        
        <div class="menu-content">
            <div id="user-view">
                <p class="dev-text">Система в стадії розробки...</p>
            </div>

            <div id="admin-view" class="hidden">
                <div class="divider"></div>
                <button class="menu-item secret-btn" onclick="openChat()">⚡ Milka Bot</button>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden">
        <div class="chat-header">
            <span class="neon-title"><span class="neon-bot">🤖</span> Milka System</span>
            <button onclick="closeChat()" class="close-btn">❌</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Команда...">
            <button onclick="sendMessage()" class="send-btn">➤</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
