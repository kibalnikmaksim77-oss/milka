<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milka Infinity Cyber</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            min-height: 100vh;
            width: 100vw;
            /* Дозволяємо скрол, якщо інфи багато */
            overflow-y: auto;
            overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Фоновий бик — тепер він зафіксований на місці */
        .background-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Неонова шапка */
        .header {
            width: 100%;
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(188, 19, 254, 0.3), transparent);
            color: #bc13fe;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #bc13fe;
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
        }

        /* Основний контент, який може бути безкінечним */
        .content-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* Додаємо легке неонове світіння по боках, щоб дизайн не "кінчався" */
            border-left: 1px solid rgba(188, 19, 254, 0.1);
            border-right: 1px solid rgba(188, 19, 254, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .info-card {
            background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.3);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.1);
        }

        .footer {
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5));
            text-align: center;
            position: sticky; /* Кнопка завжди знизу, навіть при скролі */
            bottom: 0;
        }

        .user-info {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #bc13fe;
        }

        .btn-close {
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 50px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 10px #bc13fe;
        }
    </style>
</head>
<body>

    <img src="1000015397.jpg" class="background-fixed">

    <div class="header">MILKA CYBER SYSTEM</div>

    <div class="content-area">
        <div class="info-card">
            <p style="color: #bc13fe; font-weight: bold;">[ SYSTEM STATUS ]</p>
            <p>Connection: Stable</p>
            <p>Protocol: Neural-Link v2</p>
        </div>
        
        <div class="info-card">
            <p style="color: #bc13fe; font-weight: bold;">[ USER DATA ]</p>
            <p>Name: <span id="u-name">USER</span></p>
            <p>ID: <span id="u-id">0000</span></p>
        </div>

        </div>

    <div class="footer">
        <button class="btn-close" onclick="tg.close()">Відключитись</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('u-name').innerText = user.first_name.toUpperCase();
            document.getElementById('u-id').innerText = user.id;
        }
    </script>
</body>
</html>
