<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Final Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* БАЗОВИЙ ФОН (Темний космос) */
            background-color: #0b0716;
            
            /* ЦЕ ЧИСТА ГУМКА: м'яке неонове світіння по боках, як на твоєму фото.
               Воно заміняє чорну діру, але не створює різких рамок. */
            background-image:
                linear-gradient(90deg, rgba(160, 20, 255, 0.2) 0%, transparent 15%),
                linear-gradient(270deg, rgba(5, 217, 232, 0.2) 0%, transparent 15%);
            background-attachment: fixed;
            
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* 1. ВЕРХ: БИК (Один єдиний, ніяких копій) */
        .top-bull {
            width: 100vw;
            /* Обрізаємо картинку рівно до зони пустоти */
            aspect-ratio: 1000 / 1100;
            background: url('1000015397.jpg') no-repeat top center;
            background-size: 100vw auto;
            flex-shrink: 0;
            
            /* МАГІЯ: плавно розчиняємо низ бика, щоб він ідеально влився у гумку */
            -webkit-mask-image: linear-gradient(to bottom, #000 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000 80%, transparent 100%);
            z-index: 2;
        }

        /* 2. СЕРЕДИНА: ТЕКСТ (Зона розтягування) */
        .content-area {
            flex-grow: 1;
            padding: 0 20px;
            /* Текст починається ЧІТКО під биком, а не на його морді */
            margin-top: -5vw;
            position: relative;
            z-index: 10;
        }

        /* 3. НИЗ: СХЕМИ (Все що під помаранчевою лінією) */
        .bottom-schemes {
            width: 100vw;
            /* Беремо тільки нижню частину фотографії */
            aspect-ratio: 1000 / 500;
            background: url('1000015397.jpg') no-repeat bottom center;
            background-size: 100vw auto;
            flex-shrink: 0;
            
            /* МАГІЯ: плавно розчиняємо верх схем, щоб вони злилися з гумкою */
            -webkit-mask-image: linear-gradient(to top, #000 70%, transparent 100%);
            mask-image: linear-gradient(to top, #000 70%, transparent 100%);
            margin-bottom: 80px;
            margin-top: 10px;
            z-index: 2;
        }

        /* КНОПКА */
        .fixed-btn-container {
            position: fixed;
            bottom: 25px;
            left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }

        .btn-disconnect {
            background: rgba(10, 5, 20, 0.9);
            border: 2px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 45px;
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.6); cursor: pointer;
            backdrop-filter: blur(5px); border-radius: 4px;
        }

        .sys-text { color: #05d9e8; font-weight: bold; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bull"></div>

        <div class="content-area">
            <span class="sys-text">>> SYSTEM_MODE: CLEAN_RUBBER</span>
            
            <p>Бик тільки один. Подвійних дублікатів більше немає.</p>
            <p>Текст починається рівно під картинкою і не перекриває її.</p>
            
            <br><br><br><br><br><br><br><br><br><br><br><br>
            <p>Ця зона — це "чиста гумка". Вона розтягує тільки колір, не деформуючи фото.</p>
            <p>Гортай далі, і побачиш оригінальні схеми в самому кінці.</p>
            <br><br><br><br><br><br><br><br><br><br>
        </div>

        <div class="bottom-schemes"></div>
    </div>

    <div class="fixed-btn-container">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
