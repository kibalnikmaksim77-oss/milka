<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Perfect Original</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            
            /* БЕРЕМО ТВОЮ ОРИГІНАЛЬНУ ФОТОГРАФІЮ */
            border-style: solid;
            border-color: transparent;
            border-image-source: url('1000015397.jpg');
            
            /* МАГІЯ ІДЕАЛЬНОЇ НАРІЗКИ:
               58% - від верху до копит бика.
               40% - від схем до самого низу.
               fill - тягне чистий космос між ними. */
            border-image-slice: 58% 0 40% 0 fill;
            
            /* МАТЕМАТИЧНО ТОЧНІ ПРОПОРЦІЇ ДЛЯ ЕКРАНУ:
               Щоб бик не був товстим, а схеми не були сплющеними. */
            border-width: 66vw 0 46vw 0;
            
            /* ВМИКАЄМО ГУМКУ ТІЛЬКИ ДЛЯ ЦЕНТРУ */
            border-image-repeat: stretch;
        }

        .content-area {
            flex-grow: 1;
            /* Відступи захищають морду бика і схеми від тексту */
            padding: 10px 20px 80px 20px;
            position: relative;
            z-index: 10;
        }

        /* КНОПКА ВИХОДУ */
        .fixed-btn-container {
            position: fixed;
            bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }

        .btn-disconnect {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #bc13fe; color: #bc13fe;
            padding: 12px 45px; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px #bc13fe; cursor: pointer;
            backdrop-filter: blur(5px); border-radius: 4px;
        }

        .sys-text { color: #05d9e8; font-weight: bold; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="content-area">
            <span class="sys-text">>> SYSTEM_MODE: ORIGINAL_PHOTO_RUBBER</span>
            
            <p>1. Тягнеться тільки твоє оригінальне фото.</p>
            <p>2. Жодних фейкових рамок чи CSS-градієнтів.</p>
            <p>3. Штрих-кодів більше немає, бо ми тягнемо чисте місце на фотці.</p>
            
            <br><br><br><br><br><br><br><br><br><br><br><br>
            <p>Текст чітко у своїй зоні.</p>
            <p>А схеми надійно чекають тебе в самому низу.</p>
            <br><br><br><br><br><br><br><br><br><br>
        </div>
    </div>

    <div class="fixed-btn-container">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
