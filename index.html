<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Milka Cyber Rubber Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Обнуляємо все */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            
            /* ЦЕ ТВОЯ ГУМКА: ми беремо неонові кольори з країв твого фото 
               і змушуємо їх тягнутися вічно по боках. Жодних рамок, тільки лінії. */
            background-image: linear-gradient(90deg, #bc13fe 0%, #000 5%, #000 95%, #05d9e8 100%);
            background-attachment: fixed;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* ВЕРХ: БИК І ЛОГО (Тільки верхня частина фото) */
        .header-bull {
            width: 100%;
            /* Висота до твоєї лінії "гумки" */
            aspect-ratio: 1000 / 1150; 
            background: url('1000015397.jpg') no-repeat top center;
            background-size: 100% auto;
            flex-shrink: 0;
            z-index: 1;
        }

        /* СЕРЕДИНА: ТЕКСТ (Зона, яка тягнеться) */
        .content-area {
            flex-grow: 1; /* Це і є гумка, вона розсовує верх і низ */
            padding: 20px;
            position: relative;
            z-index: 2;
            /* Текст починається чітко під биком */
        }

        /* НИЗ: СХЕМИ (Все, що нижче твоєї оранжевої лінії) */
        .footer-schemes {
            width: 100%;
            /* Точний оригінальний розмір нижньої частини фото */
            aspect-ratio: 1000 / 530; 
            background: url('1000015397.jpg') no-repeat bottom center;
            background-size: 100% auto;
            flex-shrink: 0;
            margin-bottom: 80px; /* Місце для кнопки DISCONNECT */
        }

        /* Кнопка */
        .fixed-footer {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn-disconnect {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #bc13fe;
            color: #bc13fe;
            padding: 12px 45px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px #bc13fe;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .log-text {
            color: #05d9e8;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-bull"></div>

        <div class="content-area">
            <span class="log-text">>> SYSTEM_RUBBER_MODE: ACTIVE</span>
            <p>Тут твій текст. Він розтягує сторінку.</p>
            <p>Бокові неонові лінії тепер тягнуться суто кодом разом із текстом.</p>
            
            <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
            <p>Нижче — твої схеми в оригінальному розмірі.</p>
        </div>

        <div class="footer-schemes"></div>
    </div>

    <div class="fixed-footer">
        <button class="btn-disconnect" onclick="Telegram.WebApp.close()">DISCONNECT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
